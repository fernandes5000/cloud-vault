services:
  backend:
    build:
      context: .
      dockerfile: ops/docker/backend/Dockerfile
    working_dir: /var/www/backend
    command: sh -lc "composer install --no-dev --prefer-dist --no-interaction && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/backend/database/database.sqlite
      QUEUE_CONNECTION: sync
      CACHE_STORE: file
      SESSION_DRIVER: file
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    ports:
      - "8000:8000"

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - web
    ports:
      - "8080:80"
    volumes:
      - ./ops/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro

volumes:
  backend_vendor:
  web_node_modules:
